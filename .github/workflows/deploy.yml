name: Build & Deploy

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: eu-north-1  # Set to your desired AWS region
          
      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2
        
      - name: Build and push image
        run: |
          docker build -t industry-analyst .
          docker tag industry-analyst ${{ secrets.ECR_URI }}:$GITHUB_SHA
          docker push ${{ secrets.ECR_URI }}:$GITHUB_SHA
          
      - name: Trigger App Runner redeploy
        run: aws apprunner start-deployment --service-arn ${{ secrets.APP_RUNNER_ARN }}
